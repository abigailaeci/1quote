<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Tenang - Malam Berbintang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Caveat:wght@400;700&family=Playfair+Display:italic,wght@400;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(to bottom, #020617, #0f172a, #1e293b);
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #f8fafc;
        }

        /* Bintang Berkelip */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
        }

        .nebula-1 { width: 500px; height: 500px; background: #1e3a8a; top: -10%; right: -10%; }
        .nebula-2 { width: 400px; height: 400px; background: #0c4a6e; bottom: -10%; left: -10%; }

        .content-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            padding: 4rem 2rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 550px;
            width: 85%;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Font Handwriting Caveat yang lebih santai */
        .sweet-title {
            font-family: 'Caveat', cursive;
            color: #e2e8f0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            line-height: 1.1;
        }

        .btn-quote {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 1rem 3.5rem;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-quote:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.05);
            letter-spacing: 1.5px;
        }

        .credit-text {
            margin-top: 2.5rem;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            font-weight: 300;
            font-style: italic;
        }

        .hidden-card {
            display: none;
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }

        .fade-in { animation: fadeIn 2s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="star-container"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>

    <!-- Page 1: Home -->
    <div id="main-page" class="content-card fade-in">
        <h2 class="sweet-title text-5xl md:text-6xl mb-2">
            One Quote
        </h2>
        <h3 class="sweet-title text-3xl md:text-4xl mb-12 opacity-90">
            for a special one
        </h3>
        <p class="text-slate-500 mb-12 text-xs font-light tracking-[0.2em] uppercase italic opacity-60">
            a little message for your day..
        </p>
        
        <button onclick="showQuote()" class="btn-quote">
            Open Message
        </button>

        <div class="credit-text">
            by @abigaila_eci x @masih_hidvp
        </div>
    </div>

    <!-- Page 2: Quote Display -->
    <div id="quote-page" class="content-card hidden-card">
        <div id="quote-text" class="text-xl md:text-2xl font-light text-white italic leading-relaxed mb-8">
            <!-- Text Quote -->
        </div>
        <div id="quote-author" class="text-blue-400 font-bold tracking-widest uppercase text-[10px] mb-12 opacity-60">
            <!-- Author -->
        </div>
        
        <div class="flex flex-col items-center">
            <button onclick="showQuote()" class="btn-quote text-sm px-10 py-3">
                Give me another one
            </button>
            <div class="credit-text">
                by @abigaila_eci x @masih_hidvp
            </div>
        </div>
    </div>

            { t: "Kamu adalah arsitek dari nasibmu sendiri; kamu adalah penulis dari ceritamu sendiri.", a: "Anonim" },

            { t: "Perjalanan seribu mil dimulai dengan satu langkah.", a: "Lao Tzu" },
            { t: "Kebahagiaan bukanlah tujuan, itu adalah cara hidup.", a: "Burton Hills" },
            { t: "Hal-hal terbaik dan terindah di dunia tidak dapat dilihat atau disentuh, mereka harus dirasakan dengan hati.", a: "Helen Keller" },
            { t: "Hidup bukan tentang menemukan dirimu sendiri. Hidup adalah tentang menciptakan dirimu sendiri.", a: "George Bernard Shaw" },
            { t: "Jika kamu ingin mengangkat dirimu sendiri, angkatlah orang lain.", a: "Booker T. Washington" },
            { t: "Kita adalah apa yang kita lakukan berulang kali. Keunggulan, bukanlah tindakan, melainkan kebiasaan.", a: "Aristoteles" },
            { t: "Masa depan milik mereka yang percaya pada keindahan mimpi mereka.", a: "Eleanor Roosevelt" },
            { t: "Jangan hitung hari, buatlah hari-hari itu berarti.", a: "Muhammad Ali" },

            { t: "Kesempatan seringkali menyamar sebagai kerja keras, jadi kebanyakan orang tidak mengenalinya.", a: "Ann Landers" },

        function createStars() {
            const container = document.getElementById('star-container');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = 1 + Math.random() * 2;
                const duration = 3 + Math.random() * 5;
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.setProperty('--duration', `${duration}s`);
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }

        function showQuote() {
            const mainPage = document.getElementById('main-page');
            const quotePage = document.getElementById('quote-page');
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');

            const q = quotesList[Math.floor(Math.random() * quotesList.length)];
            
            quotePage.style.opacity = '0';
            
            setTimeout(() => {
                textEl.innerText = `"${q.t}"`;
                authorEl.innerText = `— ${q.a}`;
                
                mainPage.classList.add('hidden-card');
                quotePage.classList.remove('hidden-card');
                
                setTimeout(() => {
                    quotePage.style.opacity = '1';
                    quotePage.style.transform = 'scale(1) translateY(0)';
                }, 50);
            }, 300);
        }

        window.onload = createStars;
    </script>
</body>
</html>
